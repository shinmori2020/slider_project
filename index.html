<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Demo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/slider/slider-tab-peek.css">
</head>
<body>

  <!-- ── Site Header ── -->
  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <p class="site-header__title">Slider Demo</p>
      <nav class="site-header__nav" aria-label="デモナビゲーション">
        <a href="#slider-01">01 タブ+Peek</a>
      </nav>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="site-main" id="main-content">

    <!-- ══ No.01 三菱風 タブ連動 + Peek型 ══ -->
    <section class="demo-section" id="slider-01">
      <div class="demo-section__label" aria-hidden="true">
        <span class="demo-section__number">No.01</span>
        <span class="demo-section__title">タブ連動 + Peek型スライダー</span>
      </div>

      <div
        class="slider-mitsubishi"
        role="region"
        aria-label="カーラインアップ スライダー"
        tabindex="0"
      >
        <!-- スクリーンリーダー用ライブリージョン -->
        <div
          class="slider-mitsubishi__live visually-hidden"
          aria-live="polite"
          aria-atomic="true"
        ></div>

        <!-- ── ヘッダー：見出し + タブナビ ── -->
        <div class="slider-mitsubishi__header">
          <div class="slider-mitsubishi__heading">
            <h2 class="slider-mitsubishi__title-en">Line Up</h2>
            <p class="slider-mitsubishi__title-ja">カーラインアップ</p>
          </div>

          <nav
            class="slider-mitsubishi__tabs"
            role="tablist"
            aria-label="車種カテゴリ"
          >
            <!-- Tab 0: EV/PHEV -->
            <button
              class="slider-mitsubishi__tab is-active"
              role="tab"
              aria-selected="true"
              aria-controls="sm-slide-0"
              id="sm-tab-0"
              data-index="0"
            >
              <!-- EV/PHEV クロスオーバーSUV シルエット -->
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 52 30" aria-hidden="true">
                <path d="M3,27 L3,21 Q3,17 6,15 L13,12 Q18,10 24,9 Q30,9 37,11 L44,14 Q48,16 49,19 L49,27 Z"/>
                <circle cx="13" cy="27" r="6" fill="#242424"/>
                <circle cx="39" cy="27" r="6" fill="#242424"/>
                <circle cx="13" cy="27" r="4"/>
                <circle cx="39" cy="27" r="4"/>
                <circle cx="13" cy="27" r="1.5" fill="#242424"/>
                <circle cx="39" cy="27" r="1.5" fill="#242424"/>
                <!-- Eボルトマーク -->
                <path d="M25,4 L22,9 L25,8 L22,14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              </svg>
              <span>EV/PHEV</span>
            </button>

            <!-- Tab 1: SUV -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-1"
              id="sm-tab-1"
              data-index="1"
              tabindex="-1"
            >
              <!-- SUV（背高・ボックス型） -->
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 52 30" aria-hidden="true">
                <path d="M3,27 L3,19 Q3,14 7,12 L14,10 Q19,8 26,8 Q32,8 39,10 L45,13 Q49,15 49,19 L49,27 Z"/>
                <circle cx="13" cy="27" r="6" fill="#242424"/>
                <circle cx="39" cy="27" r="6" fill="#242424"/>
                <circle cx="13" cy="27" r="4"/>
                <circle cx="39" cy="27" r="4"/>
                <circle cx="13" cy="27" r="1.5" fill="#242424"/>
                <circle cx="39" cy="27" r="1.5" fill="#242424"/>
                <!-- ルーフライン（直線的・高め） -->
                <line x1="14" y1="10" x2="39" y2="10" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
              </svg>
              <span>SUV</span>
            </button>

            <!-- Tab 2: ミニバン -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-2"
              id="sm-tab-2"
              data-index="2"
              tabindex="-1"
            >
              <!-- ミニバン（フラット屋根・背高・全長長め） -->
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 52 30" aria-hidden="true">
                <path d="M3,27 L3,17 Q3,13 6,12 L11,11 Q14,9 26,9 Q36,9 42,11 L47,14 Q49,16 49,19 L49,27 Z"/>
                <rect x="11" y="9" width="31" height="2" rx="1" fill="#242424" opacity="0.4"/>
                <circle cx="12" cy="27" r="6" fill="#242424"/>
                <circle cx="40" cy="27" r="6" fill="#242424"/>
                <circle cx="12" cy="27" r="4"/>
                <circle cx="40" cy="27" r="4"/>
                <circle cx="12" cy="27" r="1.5" fill="#242424"/>
                <circle cx="40" cy="27" r="1.5" fill="#242424"/>
                <!-- スライドドア線 -->
                <line x1="30" y1="13" x2="30" y2="21" stroke="#242424" stroke-width="1" opacity="0.5"/>
              </svg>
              <span>ミニバン</span>
            </button>

            <!-- Tab 3: コンパクト -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-3"
              id="sm-tab-3"
              data-index="3"
              tabindex="-1"
            >
              <!-- コンパクト（スロープドルーフ・ハッチバック） -->
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 52 30" aria-hidden="true">
                <path d="M3,27 L3,21 Q3,17 6,15 L12,12 Q16,10 22,9 Q28,9 34,10 L41,13 Q47,15 49,19 L49,27 Z"/>
                <!-- ハッチバックのリアスロープ -->
                <path d="M12,12 L9,19" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>
                <circle cx="13" cy="27" r="5.5" fill="#242424"/>
                <circle cx="39" cy="27" r="5.5" fill="#242424"/>
                <circle cx="13" cy="27" r="3.5"/>
                <circle cx="39" cy="27" r="3.5"/>
                <circle cx="13" cy="27" r="1.5" fill="#242424"/>
                <circle cx="39" cy="27" r="1.5" fill="#242424"/>
              </svg>
              <span>コンパクト</span>
            </button>

            <!-- Tab 4: 軽自動車 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-4"
              id="sm-tab-4"
              data-index="4"
              tabindex="-1"
            >
              <!-- 軽自動車（超ボックス型・短いホイールベース） -->
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 52 30" aria-hidden="true">
                <path d="M9,27 L9,17 Q9,12 12,11 L16,10 Q19,9 26,9 Q33,9 36,10 L40,11 Q43,12 43,17 L43,27 Z"/>
                <circle cx="17" cy="27" r="5.5" fill="#242424"/>
                <circle cx="35" cy="27" r="5.5" fill="#242424"/>
                <circle cx="17" cy="27" r="3.5"/>
                <circle cx="35" cy="27" r="3.5"/>
                <circle cx="17" cy="27" r="1.5" fill="#242424"/>
                <circle cx="35" cy="27" r="1.5" fill="#242424"/>
                <!-- フロントフラット -->
                <line x1="43" y1="11" x2="43" y2="20" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
              </svg>
              <span>軽自動車</span>
            </button>

            <!-- Tab 5: 商用車 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-5"
              id="sm-tab-5"
              data-index="5"
              tabindex="-1"
            >
              <!-- 商用車（キャブオーバー・フラットノーズ） -->
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 52 30" aria-hidden="true">
                <path d="M3,27 L3,16 Q3,11 6,10 L10,9 Q14,9 14,9 L14,8 Q14,8 26,8 L44,9 Q48,10 49,14 L49,27 Z"/>
                <!-- キャブ部分 -->
                <path d="M3,16 L14,16 L14,9 L6,10 Q3,11 3,16 Z" fill="#242424" opacity="0.3"/>
                <circle cx="12" cy="27" r="6" fill="#242424"/>
                <circle cx="40" cy="27" r="6" fill="#242424"/>
                <circle cx="12" cy="27" r="4"/>
                <circle cx="40" cy="27" r="4"/>
                <circle cx="12" cy="27" r="1.5" fill="#242424"/>
                <circle cx="40" cy="27" r="1.5" fill="#242424"/>
                <!-- ボディとキャブの境界線 -->
                <line x1="14" y1="9" x2="14" y2="21" stroke="#242424" stroke-width="1.5" opacity="0.6"/>
              </svg>
              <span>商用車</span>
            </button>
          </nav>
        </div><!-- /.slider-mitsubishi__header -->

        <!-- ── スライドステージ ── -->
        <div class="slider-mitsubishi__stage">
          <div class="slider-mitsubishi__track">

            <!-- Slide 0: EV/PHEV -->
            <div
              class="slider-mitsubishi__item is-active"
              id="sm-slide-0"
              role="tabpanel"
              aria-labelledby="sm-tab-0"
              data-caption="OUTLANDER PHEV"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">EV / PHEV</span>
                </div>
              </div>
            </div>

            <!-- Slide 1: SUV -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-1"
              role="tabpanel"
              aria-labelledby="sm-tab-1"
              data-caption="ECLIPSE CROSS"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">SUV</span>
                </div>
              </div>
            </div>

            <!-- Slide 2: ミニバン -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-2"
              role="tabpanel"
              aria-labelledby="sm-tab-2"
              data-caption="DELICA D:5"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">ミニバン</span>
                </div>
              </div>
            </div>

            <!-- Slide 3: コンパクト -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-3"
              role="tabpanel"
              aria-labelledby="sm-tab-3"
              data-caption="COLT"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">コンパクト</span>
                </div>
              </div>
            </div>

            <!-- Slide 4: 軽自動車 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-4"
              role="tabpanel"
              aria-labelledby="sm-tab-4"
              data-caption="eK CROSS"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">軽自動車</span>
                </div>
              </div>
            </div>

            <!-- Slide 5: 商用車 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-5"
              role="tabpanel"
              aria-labelledby="sm-tab-5"
              data-caption="DELICA D:3"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">商用車</span>
                </div>
              </div>
            </div>

          </div><!-- /.slider-mitsubishi__track -->

          <!-- ── ナビゲーションボタン（菱形） ── -->
          <button
            class="slider-mitsubishi__btn slider-mitsubishi__btn--prev"
            aria-label="前のスライドへ"
          >
            <svg
              class="slider-mitsubishi__btn-icon"
              viewBox="0 0 22 22"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="13,5 7,11 13,17"/>
            </svg>
          </button>

          <button
            class="slider-mitsubishi__btn slider-mitsubishi__btn--next"
            aria-label="次のスライドへ"
          >
            <svg
              class="slider-mitsubishi__btn-icon"
              viewBox="0 0 22 22"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="9,5 15,11 9,17"/>
            </svg>
          </button>

        </div><!-- /.slider-mitsubishi__stage -->

        <!-- ── フッター：車名キャプション + CTA ── -->
        <div class="slider-mitsubishi__footer">
          <p
            class="slider-mitsubishi__caption"
            aria-live="polite"
            aria-atomic="true"
          >OUTLANDER PHEV</p>

          <a class="slider-mitsubishi__cta" href="#">
            カーラインアップから探す
            <span class="slider-mitsubishi__cta-arrow" aria-hidden="true">→</span>
          </a>
        </div>

      </div><!-- /.slider-mitsubishi -->
    </section><!-- /#slider-01 -->

  </main>

  <!-- ── Site Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <p>&copy; 2024 Slider Demo — Portfolio</p>
  </footer>

  <!-- JS（slider → main の順に読み込む） -->
  <script src="js/slider/slider-tab-peek.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
