<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Demo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/slider/slider-tab-peek.css">
</head>
<body>

  <!-- ── Site Header ── -->
  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <p class="site-header__title">Slider Demo</p>
      <nav class="site-header__nav" aria-label="デモナビゲーション">
        <a href="#slider-01">01 タブ+Peek</a>
      </nav>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="site-main" id="main-content">

    <!-- ══ No.01 三菱風 タブ連動 + Peek型 ══ -->
    <section class="demo-section" id="slider-01">
      <div class="demo-section__label" aria-hidden="true">
        <span class="demo-section__number">No.01</span>
        <span class="demo-section__title">タブ連動 + Peek型スライダー</span>
      </div>

      <div
        class="slider-mitsubishi"
        role="region"
        aria-label="製品ラインナップ スライダー"
        tabindex="0"
      >
        <!-- スクリーンリーダー用ライブリージョン -->
        <div
          class="slider-mitsubishi__live visually-hidden"
          aria-live="polite"
          aria-atomic="true"
        ></div>

        <!-- ── ヘッダー：見出し + タブナビ ── -->
        <div class="slider-mitsubishi__header">
          <div class="slider-mitsubishi__heading">
            <h2 class="slider-mitsubishi__title-en">Products</h2>
            <p class="slider-mitsubishi__title-ja">製品ラインナップ</p>
          </div>

          <nav
            class="slider-mitsubishi__tabs"
            role="tablist"
            aria-label="製品カテゴリ"
          >
            <!-- Tab 0: SERIES 01 -->
            <button
              class="slider-mitsubishi__tab is-active"
              role="tab"
              aria-selected="true"
              aria-controls="sm-slide-0"
              id="sm-tab-0"
              data-index="0"
            >
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="8" width="18" height="13" rx="1"/>
                <polyline points="3,8 12,3 21,8"/>
                <line x1="8" y1="14" x2="16" y2="14"/>
              </svg>
              <span class="slider-mitsubishi__tab-label">SERIES 01</span>
            </button>

            <!-- Tab 1: SERIES 02 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-1"
              id="sm-tab-1"
              data-index="1"
              tabindex="-1"
            >
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
              </svg>
              <span class="slider-mitsubishi__tab-label">SERIES 02</span>
            </button>

            <!-- Tab 2: SERIES 03 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-2"
              id="sm-tab-2"
              data-index="2"
              tabindex="-1"
            >
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20.59,13.41l-7.17,7.17a2,2,0,0,1-2.83,0L2,12V2h10l8.59,8.59A2,2,0,0,1,20.59,13.41Z"/>
                <circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/>
              </svg>
              <span class="slider-mitsubishi__tab-label">SERIES 03</span>
            </button>

            <!-- Tab 3: SERIES 04 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-3"
              id="sm-tab-3"
              data-index="3"
              tabindex="-1"
            >
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
              </svg>
              <span class="slider-mitsubishi__tab-label">SERIES 04</span>
            </button>

            <!-- Tab 4: SERIES 05 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-4"
              id="sm-tab-4"
              data-index="4"
              tabindex="-1"
            >
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="12,2 19,8 16,22 8,22 5,8"/>
                <polyline points="5,8 12,13 19,8"/>
              </svg>
              <span class="slider-mitsubishi__tab-label">SERIES 05</span>
            </button>

            <!-- Tab 5: SERIES 06 -->
            <button
              class="slider-mitsubishi__tab"
              role="tab"
              aria-selected="false"
              aria-controls="sm-slide-5"
              id="sm-tab-5"
              data-index="5"
              tabindex="-1"
            >
              <svg class="slider-mitsubishi__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12,22s8-4,8-10V5l-8-3L4,5v7c0,6,8,10,8,10z"/>
              </svg>
              <span class="slider-mitsubishi__tab-label">SERIES 06</span>
            </button>
          </nav>
        </div><!-- /.slider-mitsubishi__header -->

        <!-- ── スライドステージ ── -->
        <div class="slider-mitsubishi__stage">
          <div class="slider-mitsubishi__track">

            <!-- Slide 0 -->
            <div
              class="slider-mitsubishi__item is-active"
              id="sm-slide-0"
              role="tabpanel"
              aria-labelledby="sm-tab-0"
              data-caption="PRODUCT NAME 01"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">PRODUCT 01</span>
                </div>
              </div>
            </div>

            <!-- Slide 1 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-1"
              role="tabpanel"
              aria-labelledby="sm-tab-1"
              data-caption="PRODUCT NAME 02"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">PRODUCT 02</span>
                </div>
              </div>
            </div>

            <!-- Slide 2 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-2"
              role="tabpanel"
              aria-labelledby="sm-tab-2"
              data-caption="PRODUCT NAME 03"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">PRODUCT 03</span>
                </div>
              </div>
            </div>

            <!-- Slide 3 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-3"
              role="tabpanel"
              aria-labelledby="sm-tab-3"
              data-caption="PRODUCT NAME 04"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">PRODUCT 04</span>
                </div>
              </div>
            </div>

            <!-- Slide 4 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-4"
              role="tabpanel"
              aria-labelledby="sm-tab-4"
              data-caption="PRODUCT NAME 05"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">PRODUCT 05</span>
                </div>
              </div>
            </div>

            <!-- Slide 5 -->
            <div
              class="slider-mitsubishi__item"
              id="sm-slide-5"
              role="tabpanel"
              aria-labelledby="sm-tab-5"
              data-caption="PRODUCT NAME 06"
            >
              <div class="slider-mitsubishi__image-wrap">
                <div class="slider-mitsubishi__placeholder" aria-hidden="true">
                  <span class="slider-mitsubishi__placeholder-label">PRODUCT 06</span>
                </div>
              </div>
            </div>

          </div><!-- /.slider-mitsubishi__track -->

          <!-- ── ナビゲーションボタン（菱形） ── -->
          <button
            class="slider-mitsubishi__btn slider-mitsubishi__btn--prev"
            aria-label="前のスライドへ"
          >
            <svg
              class="slider-mitsubishi__btn-icon"
              viewBox="0 0 22 22"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="13,5 7,11 13,17"/>
            </svg>
          </button>

          <button
            class="slider-mitsubishi__btn slider-mitsubishi__btn--next"
            aria-label="次のスライドへ"
          >
            <svg
              class="slider-mitsubishi__btn-icon"
              viewBox="0 0 22 22"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="9,5 15,11 9,17"/>
            </svg>
          </button>

        </div><!-- /.slider-mitsubishi__stage -->

        <!-- ── フッター：キャプション + CTA ── -->
        <div class="slider-mitsubishi__footer">
          <p
            class="slider-mitsubishi__caption"
            aria-live="polite"
            aria-atomic="true"
          >01 — PRODUCT NAME 01</p>

          <a class="slider-mitsubishi__cta" href="#">
            製品一覧から探す
            <span class="slider-mitsubishi__cta-arrow" aria-hidden="true">→</span>
          </a>
        </div>

      </div><!-- /.slider-mitsubishi -->
    </section><!-- /#slider-01 -->

  </main>

  <!-- ── Site Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <p>&copy; 2024 Slider Demo — Portfolio</p>
  </footer>

  <!-- JS（slider → main の順に読み込む） -->
  <script src="js/slider/slider-tab-peek.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
